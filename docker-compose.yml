services:
  doltdb:
    image: dolthub/dolt-sql-server:latest
    volumes:
      - dolt-data:/var/lib/dolt
      - ./dolt/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      DOLT_ROOT_PASSWORD: bookshelf
    ports:
      - "3306"
    healthcheck:
      test: ["CMD-SHELL", "dolt sql -q 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  backend:
    build: ./backend
    depends_on:
      doltdb:
        condition: service_healthy
    environment:
      DATABASE_HOST: doltdb
      DATABASE_PORT: "3306"
      DATABASE_NAME: bookshelf
      DATABASE_USER: bookshelf
      DATABASE_PASSWORD: bookshelf
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      SECRET_KEY: ${SECRET_KEY:-}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY:-}
      LIBRARY_NAME: ${LIBRARY_NAME:-Our Bookshelf}
    volumes:
      - covers:/app/covers
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "${HOST_PORT:-8484}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  dolt-data:
  covers:
